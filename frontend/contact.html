<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ambassador Kitchen | Contact Form</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="stylesheet" href="contact.css" />
</head>
<body>
  <div class="container">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
      <img src="logo.png" alt="Logo" style="height:40px;" />
      <span style="font-size:1.5em;font-weight:bold;">Ambassador Kitchen</span>
    </div>
    <h1>Contact Us</h1>
    <p>We’d love to hear from you. Please fill out the form below.</p>

    <form id="contactForm" autocomplete="on">
      <label for="name">Full Name *</label>
      <input type="text" id="name" name="name" required autocomplete="name" />

      <label for="email">Email Address *</label>
      <input type="email" id="email" name="email" required autocomplete="email" />

      <label for="phone">Phone Number</label>
      <input type="text" id="phone" name="phone" autocomplete="tel" />

      <label for="eventType">Event Type</label>
      <select id="eventType" name="eventType">
        <option value="">Select one</option>
        <option value="Wedding">Wedding</option>
        <option value="Corporate">Corporate</option>
        <option value="Birthday">Birthday</option>
        <option value="Private Chef">Private Chef</option>
        <option value="Other">Other</option>
      </select>

      <label for="message">Message *</label>
      <textarea id="message" name="message" required></textarea>

      <button type="submit" id="submitBtn">Send Message</button>
      <p id="responseMessage" class="response"></p>
    </form>
  </div>
  <footer style="display:flex;align-items:center;justify-content:center;gap:10px;margin-top:40px;padding:10px 0;border-top:1px solid #eee;">
    <img src="logo.png" alt="Logo" style="height:30px;" />
    <span style="font-size:1em;">&copy; 2026 Ambassador Kitchen</span>
  </footer>

  <script>
    const form = document.getElementById("contactForm");
    const responseMessage = document.getElementById("responseMessage");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      responseMessage.textContent = "Sending...";
      responseMessage.style.color = "#555";

      const formData = {
        name: form.name.value.trim(),
        email: form.email.value.trim(),
        phone: form.phone.value.trim(),
        eventType: form.eventType.value,
        message: form.message.value.trim(),
      };

      try {
        const res = await fetch("/api/contact", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(formData),
        });

        const data = await res.json();

        if (res.ok) {
          responseMessage.textContent = data.message || "Message sent successfully!";
          responseMessage.style.color = "green";
          form.reset();
        } else {
          responseMessage.textContent = data.message || "Error submitting the form.";
          responseMessage.style.color = "red";
        }
      } catch (error) {
        console.error("❌ Network error:", error);
        responseMessage.textContent = "Network error. Please try again.";
        responseMessage.style.color = "red";
      }
    });
  </script>
</body>
</html>
